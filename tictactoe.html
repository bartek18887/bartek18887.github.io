<!DOCTYPE html>
<!-- Bartek1887 © Unlicense 2026 --> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>

#main {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

table {
    font-family: monospace;
    font-size: 8em;
    line-height: 0;
    text-align: center;
    user-select: none;
}

td {
    width: 1em;
    height: 1em;
}

td[x-type='1'] {color: blue;}
td[x-type='2'] {color: red;}

table {
    border-collapse: collapse;
    border-style: hidden;
}

table td, table th {
    border: 1px solid black;
}

#gamecont {
    position: relative;
    display: block;
}

#winline {
    position: absolute;

    left: 50%;
    top: 50%;

    transform: translate(-50%, -50%);
    background-color: black;
}

#winline[x-xpos] {width: 4px; height: 100%;}
#winline[x-xpos="0"] {left: 17.5%}
#winline[x-xpos="1"] {left: 50%}
#winline[x-xpos="2"] {left: 83.5%}

#winline[x-ypos] {width: 100%; height: 4px;}
#winline[x-ypos="0"] {top: 17.5%}
#winline[x-ypos="1"] {top: 50%}
#winline[x-ypos="2"] {top: 83.5%}

#winline[x-diag] {width: 150%; height: 4px;}
#winline[x-diag="lr"] {transform: translate(-50%, -50%) rotate(45deg)}
#winline[x-diag="rl"] {transform: translate(-50%, -50%) rotate(-45deg)}

    </style>
</head>
<body>
    <main id="main">
    
    <div id="gamecont">
        <div id="winline"></div>
        <table id="game" class="gametable">
            <!-- Autogenerated by the Javascript under body -->
        </table>
    </div>
    <br>

    <center id="output">Javascript jest wyłączony.</center>

    <br>
    <br>
    <center>
    <button onclick="restart()">Reset</button>
    </center>
    </main>
</body>

<script>
let game = document.getElementById("game")
let output = document.getElementById("output")
let winline = document.getElementById("winline")

const BLANK = 0
const CIRCLE = 1
const CROSS = 2
const DRAW = 3

let curMove = CROSS
let winner = BLANK
let movesMade = 0

DEFAULT_TEXT = "Rusza się %s!"
WIN_TEXT = "Wygrywa gracz %s!"
DRAW_TEXT = "Remis!"


function updateDisplay() {
    if (winner == DRAW) {
        output.innerHTML = DRAW_TEXT
    } else if (winner != BLANK) {
        let winnerText = winner == CROSS ? "X" : "O"
        output.innerHTML = WIN_TEXT.replace("%s", winnerText)
    } else {
        let moveType = curMove == CROSS ? "X" : "O"
        output.innerHTML = DEFAULT_TEXT.replace("%s", moveType)
    }
}

function restart() {
    curMove = CROSS
    winner = BLANK
    movesMade = 0

    winline.removeAttribute("x-xpos")
    winline.removeAttribute("x-ypos")
    winline.removeAttribute("x-diag")

    game.innerHTML = ""
    for (let y=0; y <= 2; y++) {
        let tr = document.createElement("tr")
        for (let x=0; x <= 2; x++) {
            let td = document.createElement("td")
            td.onclick = function() {return userMove(x, y)}
            tr.appendChild(td)
        }
        game.appendChild(tr)
    }

    updateDisplay()
}

function getElementFor(x, y) {
    return game.children[y].children[x]
}

function place(x, y, type) {
    let el = getElementFor(x, y)
    el.setAttribute("x-type", type)

    switch (type) {
        case CROSS: el.innerText = "X"; break
        case CIRCLE: el.innerText = "O"; break
        default:
            console.warn("Type `" + type + "` is invalid! Setting to blank.")
            alert('check console')
            el.innerText = " ";
    }
}

function getMoveAt(x, y) {
    let el = getElementFor(x, y)
    switch (el.innerText) {
        case "X": return CROSS
        case "O": return CIRCLE
        default: return BLANK 
    }
}

// ret: winning type or blank
function checkWin() {
    let type = CROSS
    for (i=0; i<=1; i++) {
        for (x=0; x<=2; x++) {
            // vertical
            if (getMoveAt(x, 0) == type && getMoveAt(x, 1) == type && getMoveAt(x, 2) == type) {
                winline.setAttribute("x-xpos", x)
                return type
            }

        }
        for (y=0; y <= 2; y++) {
            // horizontal
            if (getMoveAt(0, y) == type && getMoveAt(1, y) == type && getMoveAt(2, y) == type) {
                winline.setAttribute("x-ypos", y)
                return type
            }
        }

        if (getMoveAt(0,0) == type && getMoveAt(1,1) == type && getMoveAt(2,2) == type) {
            winline.setAttribute("x-diag", "lr")
            return type
        }
        if (getMoveAt(2,0) == type && getMoveAt(1,1) == type && getMoveAt(0,2) == type) {
            winline.setAttribute("x-diag", "rl")
            return type
        }

        type = CIRCLE
    }
    if (movesMade >= 9) {
        return DRAW
    }

    return BLANK
}

function userMove(x, y) {
    if (getMoveAt(x,y) != BLANK || winner != BLANK) {
        return
    }

    place(x, y, curMove)
    movesMade++

    if (curMove == CROSS) {
        curMove = CIRCLE;
    } else {
        curMove = CROSS;
    }

    winner = checkWin()
    if (winner != BLANK) {
        console.log("WINININER  " + winner)
    }

    updateDisplay()
}

restart()

</script>
</html>
